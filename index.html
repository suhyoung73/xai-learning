<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="XAI 프로젝트 — 고등학교 인공지능 기초 수업을 위한 인터랙티브 학습 환경">
  <!-- 강제 캐시 삭제 및 항상 최신 버전 유지 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>XAI 프로젝트</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
  <!-- Offline Banner -->
  <div id="offline-banner" class="offline-banner hidden" role="alert">
    <span class="offline-icon">📡</span>
    <span>오프라인 모드 — 캐시된 콘텐츠를 사용 중입니다</span>
  </div>

  <!-- Header -->
  <header class="header">
    <button id="menu-toggle" class="menu-toggle" aria-label="메뉴 열기">
      <span class="hamburger"></span>
    </button>
    <h1 class="header-title">
      <span class="header-logo">⚡</span> XAI 프로젝트
    </h1>
    <div class="header-actions">
      <span id="status-badge" class="status-badge">✓ 콘텐츠 로드됨</span>
      <button id="code-toggle" class="code-toggle-btn" aria-label="코드 보기 토글" aria-pressed="false">
        <span class="toggle-icon">🐍</span>
        <span class="toggle-label">코드</span>
      </button>
      <button id="reset-btn" class="reset-btn" aria-label="전체 리셋">↻ 리셋</button>
    </div>
  </header>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar" aria-label="차시 목록">
    <div class="sidebar-header">
      <h2>📚 차시 목록</h2>
      <button id="sidebar-close" class="sidebar-close" aria-label="메뉴 닫기">✕</button>
    </div>
    <nav class="sidebar-nav">
      <ul>
        <li><a href="#lesson-3" class="nav-link" data-lesson="3">회귀 모델 구현하기</a></li>
        <li><a href="#lesson-4" class="nav-link" data-lesson="4">분류 모델 구현하기</a></li>
        <li><a href="#lesson-8" class="nav-link" data-lesson="8">설명 가능한 인공지능 모델</a></li>
      </ul>
    </nav>
  </aside>

  <!-- Sidebar Overlay -->
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <!-- Main Content -->
  <main id="main-content" class="main-content">
    <!-- Landing page (default) -->
    <div id="landing-page" class="landing-page">
      <div class="landing-hero">
        <div class="landing-icon">🧠</div>
        <h2>설명 가능한 인공지능 프로젝트</h2>
        <p class="landing-subtitle">인공지능 기초</p>
        <div class="landing-cards">
          <a href="#lesson-3" class="landing-card">
            <span class="card-icon">📈</span>
            <span class="card-title">회귀 모델 구현하기</span>
          </a>
          <a href="#lesson-4" class="landing-card">
            <span class="card-icon">🔬</span>
            <span class="card-title">분류 모델 구현하기</span>
          </a>
          <a href="#lesson-8" class="landing-card">
            <span class="card-icon">💡</span>
            <span class="card-title">설명 가능한 인공지능 모델</span>
          </a>
        </div>
      </div>
    </div>

    <!-- Lesson pages rendered dynamically by app.js -->
    <div id="lesson-page" class="lesson-page hidden"></div>
  </main>

  <!-- Hint Banner -->
  <div id="hint-banner" class="hint-banner hidden" role="status">
    💡 이전 셀을 먼저 확인하면 이해가 쉬워요!
  </div>

  <script src="data.js?v=4"></script>
  <script src="charts.js?v=4"></script>
  <script src="app.js?v=4"></script>
</body>
</html>
